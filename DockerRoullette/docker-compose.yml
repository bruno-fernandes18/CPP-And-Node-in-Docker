version: '3.8'

services:
  roulette-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roulette_service_container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    # Resource limits to prevent container from consuming all host RAM
    deploy:
      resources:
        limits:
          memory: 512M